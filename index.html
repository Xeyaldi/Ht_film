<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueflix - Sərhədsiz Filmlər</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Netflix-in Göy Rəng Palitrası */
        :root {
            --primary-blue: #007bff;
            --dark-bg: #04090f;
            --card-shadow: rgba(0, 123, 255, 0.3);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Naviqasiya Barı */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            display: flex; align-items: center;
            padding: 20px 4%;
            z-index: 1000;
            transition: background-color 0.5s;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        }

        .navbar.scrolled { background-color: var(--dark-bg); }

        .logo {
            color: var(--primary-blue);
            font-size: 32px;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: -1px;
            margin-right: 40px;
        }

        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-menu a { color: #e5e5e5; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-menu a:hover { color: #b3b3b3; }

        /* Ana Banner (Hero) */
        .banner {
            height: 95vh;
            background-size: cover;
            background-position: center center;
            display: flex;
            align-items: center;
            padding: 0 4%;
            position: relative;
        }

        .banner__contents {
            max-width: 600px;
            z-index: 10;
        }

        .banner__title { font-size: 4rem; font-weight: 800; padding-bottom: 0.3rem; }
        .banner__description {
            line-height: 1.3; padding-top: 1rem; font-size: 1.2rem;
            max-width: 500px; height: 80px; display: -webkit-box;
            -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        .banner__button {
            cursor: pointer; color: #fff; outline: none; border: none;
            font-weight: 700; border-radius: 0.2vw; padding: 12px 35px;
            margin-right: 1rem; background-color: rgba(51, 51, 51, 0.5);
            transition: all 0.2s;
        }

        .banner__button:hover { color: #000; background-color: #e6e6e6; }
        .btn-blue { background-color: var(--primary-blue) !important; color: white !important; }

        .banner--fadeBottom {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 14.7rem;
            background-image: linear-gradient(180deg, transparent, rgba(37, 37, 37, 0.61), var(--dark-bg));
        }

        /* Film Sıraları */
        .row { margin: 20px 0 20px 4%; }
        .row__title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        
        .row__posters {
            display: flex; overflow-y: hidden; overflow-x: scroll;
            padding: 20px; gap: 10px; scroll-behavior: smooth;
        }
        .row__posters::-webkit-scrollbar { display: none; }

        .row__poster {
            max-height: 160px; object-fit: contain; width: 100%;
            transition: var(--transition); border-radius: 4px;
        }

        .row__poster:hover {
            transform: scale(1.4);
            z-index: 100;
            box-shadow: 0px 0px 15px 5px var(--card-shadow);
        }

        /* Film İzləmə Modalı */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            position: relative; margin: 5% auto; width: 80%;
            max-width: 900px; background: #111; border-radius: 10px;
            overflow: hidden;
        }

        .close { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; z-index: 2100; }
        
        iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>

    <nav class="navbar" id="nav">
        <a href="#" class="logo">BLUEFLIX</a>
        <ul class="nav-menu">
            <li><a href="#">Ana Səhifə</a></li>
            <li><a href="#">Seriallar</a></li>
            <li><a href="#">Filmlər</a></li>
            <li><a href="#">Yeni</a></li>
            <li><a href="#">Siyahım</a></li>
        </ul>
    </nav>

    <header class="banner" id="banner">
        <div class="banner__contents">
            <h1 class="banner__title" id="banner-title"></h1>
            <div class="banner__buttons">
                <button class="banner__button btn-blue"><i class="fas fa-play"></i> Oynat</button>
                <button class="banner__button"><i class="fas fa-info-circle"></i> Ətraflı</button>
            </div>
            <h1 class="banner__description" id="banner-desc"></h1>
        </div>
        <div class="banner--fadeBottom"></div>
    </header>

    <div id="movie-rows">
        </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideo()">&times;</span>
            <div id="videoPlayer"></div>
        </div>
    </div>

    <script>
        // *** TMDB API AÇARINI BURA YAZ ***
        const API_KEY = '5e6629737920155b9e2501d51a662e15'; // Test üçün bura bir açar qoydum, amma özününkü ilə dəyişsən yaxşı olar.
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/original';

        const requests = {
            trending: `/trending/all/week?api_key=${API_KEY}&language=az-AZ`,
            originals: `/discover/tv?api_key=${API_KEY}&with_networks=213&language=az-AZ`,
            topRated: `/movie/top_rated?api_key=${API_KEY}&language=az-AZ`,
            action: `/discover/movie?api_key=${API_KEY}&with_genres=28`,
        };

        // Naviqasiya Scroll Effekti
        window.addEventListener("scroll", () => {
            if (window.scrollY > 100) document.getElementById("nav").classList.add("scrolled");
            else document.getElementById("nav").classList.remove("scrolled");
        });

        async function init() {
            // Banner üçün Trend filmi çək
            const res = await fetch(BASE_URL + requests.trending);
            const data = await res.json();
            const bannerMovie = data.results[Math.floor(Math.random() * data.results.length)];
            
            document.getElementById('banner').style.backgroundImage = `url(${IMG_URL + bannerMovie.backdrop_path})`;
            document.getElementById('banner-title').innerText = bannerMovie.title || bannerMovie.name;
            document.getElementById('banner-desc').innerText = bannerMovie.overview;

            // Kateqoriyaları yarat
            createRow("Blueflix Orijinalları", requests.originals, true);
            createRow("İndi Trenddə", requests.trending);
            createRow("Ən Çox Bəyənilənlər", requests.topRated);
            createRow("Döyüş Filmləri", requests.action);
        }

        async function createRow(title, fetchUrl, isLarge = false) {
            const res = await fetch(BASE_URL + fetchUrl);
            const data = await res.json();
            
            const row = document.createElement('div');
            row.classList.add('row');
            row.innerHTML = `<h2 class="row__title">${title}</h2>`;
            
            const posters = document.createElement('div');
            posters.classList.add('row__posters');

            data.results.forEach(movie => {
                const img = document.createElement('img');
                img.src = IMG_URL + (isLarge ? movie.poster_path : movie.backdrop_path);
                img.classList.add('row__poster');
                img.onclick = () => openVideo(movie.id, movie.media_type || 'movie');
                posters.appendChild(img);
            });

            row.appendChild(posters);
            document.getElementById('movie-rows').appendChild(row);
        }

        async function openVideo(id, type) {
            const res = await fetch(`${BASE_URL}/${type}/${id}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const trailer = data.results.find(v => v.type === 'Trailer');
            
            if (trailer) {
                document.getElementById('videoModal').style.display = 'block';
                document.getElementById('videoPlayer').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" allowfullscreen></iframe>
                `;
            } else {
                alert("Təəssüf ki, treyler tapılmadı!");
            }
        }

        function closeVideo() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('videoPlayer').innerHTML = '';
        }

        init();
    </script>
</body>
</html>
