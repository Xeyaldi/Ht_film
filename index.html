<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT CINEMA | PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-neon: #ff003c; /* Neon Qırmızı */
            --bg-deep: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --blur: blur(25px);
            --accent-gold: #f5c518;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- SOL ÜST: DİLLƏR VƏ AYARLAR --- */
        .top-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 9999;
            display: flex;
            gap: 15px;
        }

        .nav-item {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item:hover {
            border-color: var(--primary-neon);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
            transform: translateY(-3px);
        }

        /* --- HERO BANNER (GİRİŞ) --- */
        .hero {
            position: relative;
            height: 90vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 8%;
            box-sizing: border-box;
            background: linear-gradient(to right, #020202 10%, transparent 60%),
                        linear-gradient(to top, #020202 5%, transparent 40%),
                        url('https://images.alphacoders.com/131/1314946.jpeg'); /* Dinamik fon */
            background-size: cover;
            background-position: center;
            animation: heroZoom 20s infinite alternate;
        }

        @keyframes heroZoom {
            from { background-scale: 1; }
            to { background-scale: 1.1; }
        }

        .hero-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to right, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 0, 60, 0.5));
        }

        .hero-text p {
            max-width: 550px;
            font-size: 18px;
            color: #bbb;
            margin: 20px 0 40px 0;
            border-left: 3px solid var(--primary-neon);
            padding-left: 20px;
        }

        /* --- FİLM SƏBƏTİ (GRID) --- */
        .main-container {
            padding: 60px 8%;
            background: linear-gradient(to bottom, #020202, #0a0a0a);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-title span { color: var(--primary-neon); }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 35px;
        }

        .movie-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            transition: 0.5s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .movie-card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255, 0, 60, 0.2);
            border-color: var(--primary-neon);
        }

        .movie-card img {
            width: 100%;
            height: 330px;
            object-fit: cover;
            transition: 0.5s;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }

        .card-overlay h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rating {
            color: var(--accent-gold);
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }

        /* --- MODAL (GELİŞTİRİCİ VİZYONU) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.8);
        }

        .modal-content {
            position: relative;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 1000px;
            margin: 5vh auto;
            border-radius: 30px;
            padding: 40px;
            display: flex;
            gap: 40px;
            animation: modalIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 25px; right: 25px;
            font-size: 30px;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
        }

        .close-btn:hover { color: var(--primary-neon); }

        /* SKELETON LOADING */
        .skeleton {
            height: 350px;
            background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: skeletonAnim 1.5s infinite;
            border-radius: 20px;
        }

        @keyframes skeletonAnim {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* SEARCH BAR */
        .search-container {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 9999;
        }

        .search-input {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            outline: none;
            width: 250px;
            transition: 0.4s;
            font-family: inherit;
        }

        .search-input:focus {
            width: 350px;
            border-color: var(--primary-neon);
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .hero-text h1 { font-size: 45px; }
            .modal-content { flex-direction: column; width: 95%; height: 90vh; overflow-y: auto; }
            .search-container { top: 90px; left: 30px; right: auto; }
            .search-input { width: 200px; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-item" onclick="updateLang('az-AZ')">🇦🇿 AZ</div>
        <div class="nav-item" onclick="updateLang('tr-TR')">🇹🇷 TR</div>
        <div class="nav-item" onclick="updateLang('en-US')">🇺🇸 EN</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" id="search" placeholder="Film axtar...">
    </div>

    <section class="hero" id="hero-section">
        <div class="hero-text">
            <h1 id="h-title">HT CINEMA</h1>
            <p id="h-desc">Gələcəyin rəqəmsal kinoteatrına xoş gəlmisiniz. Ən son filmlər, real vaxtda yenilənən reytinqlər və möhtəşəm vizuallar.</p>
            <div class="nav-item" style="display:inline-block; background: var(--primary-neon); border:none;" onclick="scrollToContent()">KƏŞF ET</div>
        </div>
    </section>

    <div class="main-container" id="movies-anchor">
        <div class="section-header">
            <h2 class="section-title" id="s-title">POPULYAR <span>FİLMLƏR</span></h2>
        </div>
        
        <div class="movie-grid" id="movie-grid">
            </div>
    </div>

    <div class="modal" id="movie-modal">
        <div class="modal-content" id="modal-data">
            </div>
    </div>

    <script>
        // API KONFİQURASİYASI
        const API_KEY = 'SƏNİN_API_KODUN_BURA'; // <--- API KODUNU BURA YAPIŞDIR!
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w1280';

        let currentLang = 'az-AZ';

        // İlk işə düşmə
        window.addEventListener('DOMContentLoaded', () => {
            loadMovies();
            setupSearch();
        });

        async function loadMovies(endpoint = '/movie/popular', query = '') {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '<div class="skeleton"></div>'.repeat(12);

            try {
                const url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&language=${currentLang}${query}`;
                const res = await fetch(url);
                const data = await res.json();
                renderMovies(data.results);
            } catch (err) {
                grid.innerHTML = `<p style="color:red">API xətası! Zəhmət olmasa API açarınızı yoxlayın.</p>`;
            }
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${movie.poster_path ? IMG_URL + movie.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" alt="${movie.title}">
                    <div class="card-overlay">
                        <h3>${movie.title}</h3>
                        <div class="rating"><i class="fas fa-star"></i> ${movie.vote_average.toFixed(1)}</div>
                    </div>
                `;
                card.onclick = () => showDetails(movie.id);
                grid.appendChild(card);
            });
        }

        async function showDetails(id) {
            const res = await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}&language=${currentLang}`);
            const m = await res.json();
            
            const modal = document.getElementById('movie-modal');
            const content = document.getElementById('modal-data');
            
            content.innerHTML = `
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <img src="${IMG_URL + m.poster_path}" style="width:300px; border-radius:20px; box-shadow: 0 0 30px rgba(0,0,0,0.5)">
                <div class="details">
                    <h1 style="font-family:Orbitron; font-size:40px; margin-top:0">${m.title}</h1>
                    <p style="color:#f5c518; font-weight:bold; font-size:20px">⭐ ${m.vote_average.toFixed(1)} / 10</p>
                    <p style="line-height:1.8; color:#ddd; font-size:17px">${m.overview || 'Məzmun tapılmadı.'}</p>
                    <div style="margin-top:30px">
                        <span class="nav-item" onclick="window.open('https://www.youtube.com/results?search_query=${m.title}+trailer')">
                            <i class="fab fa-youtube"></i> TREYLERİ İZLƏ
                        </span>
                    </div>
                </div>
            `;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('movie-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateLang(l) {
            currentLang = l;
            loadMovies();
            const translations = {
                'az-AZ': { title: 'POPULYAR <span>FİLMLƏR</span>', hero: 'Müasir kinematoqrafiyanın rəqəmsal dünyasına xoş gəldiniz.' },
                'tr-TR': { title: 'POPÜLER <span>FİLMLER</span>', hero: 'Modern sinemanın dijital dünyasına hoş geldiniz.' },
                'en-US': { title: 'TRENDING <span>MOVIES</span>', hero: 'Welcome to the digital world of modern cinema.' }
            };
            document.getElementById('s-title').innerHTML = translations[l].title;
            document.getElementById('h-desc').innerText = translations[l].hero;
        }

        function setupSearch() {
            const searchInput = document.getElementById('search');
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const q = searchInput.value;
                    if(q) loadMovies('/search/movie', `&query=${encodeURIComponent(q)}`);
                }
            });
        }

        function scrollToContent() {
            document.getElementById('movies-anchor').scrollIntoView({ behavior: 'smooth' });
        }

        window.onclick = (event) => {
            const modal = document.getElementById('movie-modal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
