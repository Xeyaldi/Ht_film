<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XEYAL FİLM CENNETİ | Sinematik Platforma</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* SƏNƏ ÖZƏL RƏNG PALİTRASI */
        :root {
            --bg-body: #0a0a0f;
            --bg-nav: #12121d;
            --primary: #8a2be2; /* Elektrik Bənövşəyi */
            --secondary: #00d4ff; /* Neon Mavi */
            --text: #ffffff;
            --card-hover: rgba(138, 43, 226, 0.2);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER & NAVIGATION */
        header {
            background: var(--bg-nav);
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .search-area {
            position: relative;
            display: flex;
            align-items: center;
        }

        #searchInput {
            background: #1c1c2b;
            border: 1px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus {
            width: 350px;
            border-color: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
        }

        /* CONTENT LAYOUT */
        .main-container { padding: 40px 6%; }
        
        .filter-tabs {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
        }

        .tab {
            padding: 10px 25px;
            background: #1c1c2b;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--secondary);
        }

        /* MOVIE/TV GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--bg-nav);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.4s ease;
            border: 1px solid #222;
        }

        .item-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px var(--card-hover);
        }

        .item-card img { width: 100%; height: 280px; object-fit: cover; }

        .badge {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.85); color: var(--secondary);
            padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold;
            border: 1px solid var(--secondary);
        }

        .item-info { padding: 15px; text-align: center; }
        .item-info h4 { margin: 0; font-size: 15px; font-weight: 600; }

        /* PROFESSIONAL PLAYER MODAL */
        .player-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.98); z-index: 3000; overflow-y: auto;
        }

        .modal-inner { width: 95%; max-width: 1200px; margin: 40px auto; }
        
        .video-box { 
            background: #000; border-radius: 15px; overflow: hidden; 
            border: 2px solid #1c1c2b; box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        
        iframe { width: 100%; height: 600px; border: none; }

        /* TV SHOW CONTROLS (SEASON/EPISODE) */
        .tv-controls {
            background: var(--bg-nav); padding: 25px; margin-top: 20px;
            border-radius: 15px; border: 1px solid #222;
        }

        .season-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .s-tab { 
            padding: 8px 16px; background: #1c1c2b; border-radius: 4px; 
            cursor: pointer; font-size: 14px; border: 1px solid #333;
        }
        .s-tab.active { background: var(--primary); border-color: var(--secondary); }

        .ep-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px;
        }
        .ep-item {
            background: #1c1c2b; padding: 12px; text-align: center; 
            cursor: pointer; border-radius: 6px; font-size: 14px; transition: 0.2s;
        }
        .ep-item:hover, .ep-item.active { background: var(--secondary); color: #000; font-weight: bold; }

        .close-modal { 
            float: right; font-size: 35px; color: #fff; cursor: pointer; 
            margin-bottom: 15px; transition: 0.3s;
        }
        .close-modal:hover { color: var(--primary); transform: rotate(90deg); }

        .meta-data { margin-top: 25px; }
        .meta-data h1 { font-family: 'Orbitron'; color: var(--secondary); margin: 0; }
        .meta-data p { color: #aaa; line-height: 1.7; font-size: 16px; max-width: 900px; }

        @media (max-width: 768px) { iframe { height: 300px; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="location.reload()">XEYAL FİLM CENNETİ</a>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Film və ya Serial axtar...">
        </div>
    </header>

    <div class="main-container">
        <div class="filter-tabs">
            <div class="tab active" onclick="fetchData('/trending/all/day')">TRENDLƏR</div>
            <div class="tab" onclick="fetchData('/movie/popular')">FİLMLƏR</div>
            <div class="tab" onclick="fetchData('/tv/popular')">SERİALLAR</div>
        </div>

        <h2 id="listTitle" style="margin-bottom: 25px; font-size: 22px; color: var(--secondary);">Trend Olanlar</h2>
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="playerModal" class="player-modal">
        <div class="modal-inner">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div class="video-box">
                <iframe id="videoIframe" src="" allowfullscreen></iframe>
            </div>

            <div id="tvInterface" class="tv-controls" style="display: none;">
                <div class="season-tabs" id="seasonTabs"></div>
                <div class="ep-grid" id="episodeGrid"></div>
            </div>

            <div class="meta-data">
                <h1 id="mTitle"></h1>
                <p id="mOverview"></p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'c972e47d1574ac86dfe1d93d7e4a0b35';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        // 1. DATA ÇƏKMƏK
        async function fetchData(path, query = '') {
            const res = await fetch(`${BASE_URL}${path}?api_key=${API_KEY}&language=az-AZ${query}`);
            const data = await res.json();
            display(data.results);
        }

        function display(items) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                const isTV = (item.media_type === 'tv' || item.first_air_date) ? true : false;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="badge">⭐ ${item.vote_average.toFixed(1)}</div>
                    <img src="${IMG_URL + item.poster_path}" alt="">
                    <div class="item-info">
                        <h4>${item.title || item.name}</h4>
                    </div>
                `;
                card.onclick = () => openPlayer(item.id, isTV ? 'tv' : 'movie');
                grid.appendChild(card);
            });
        }

        // 2. PLAYER MƏNTİQİ
        let activeTVId = null;

        async function openPlayer(id, type) {
            const res = await fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=az-AZ`);
            const data = await res.json();

            document.getElementById('mTitle').innerText = data.title || data.name;
            document.getElementById('mOverview').innerText = data.overview;
            
            const iframe = document.getElementById('videoIframe');
            const tvUI = document.getElementById('tvInterface');

            if (type === 'movie') {
                tvUI.style.display = 'none';
                iframe.src = `https://vidsrc.to/embed/movie/${id}`; // Kənar server
            } else {
                activeTVId = id;
                tvUI.style.display = 'block';
                setupTVUI(data);
                iframe.src = `https://vidsrc.to/embed/tv/${id}/1/1`;
            }

            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // SERIAL ÜÇÜN SEZON VƏ BÖLÜM QURULUŞU
        function setupTVUI(data) {
            const sTabs = document.getElementById('seasonTabs');
            sTabs.innerHTML = '';
            
            data.seasons.forEach(s => {
                if(s.season_number > 0) {
                    const btn = document.createElement('div');
                    btn.className = 's-tab';
                    btn.innerText = `${s.season_number}. Sezon`;
                    btn.onclick = () => {
                        loadEpisodes(data.id, s.season_number);
                        document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    sTabs.appendChild(btn);
                }
            });
            // Default 1. Sezonu yüklə
            sTabs.firstChild.classList.add('active');
            loadEpisodes(data.id, 1);
        }

        async function loadEpisodes(tvId, sNum) {
            const res = await fetch(`${BASE_URL}/tv/${tvId}/season/${sNum}?api_key=${API_KEY}`);
            const data = await res.json();
            const eGrid = document.getElementById('episodeGrid');
            eGrid.innerHTML = '';

            data.episodes.forEach(ep => {
                const item = document.createElement('div');
                item.className = 'ep-item';
                item.innerText = ep.episode_number;
                item.onclick = () => {
                    document.getElementById('videoIframe').src = `https://vidsrc.to/embed/tv/${tvId}/${sNum}/${ep.episode_number}`;
                    document.querySelectorAll('.ep-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                };
                eGrid.appendChild(item);
            });
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('videoIframe').src = '';
            document.body.style.overflow = 'auto';
        }

        // AXTARIŞ
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchData('/search/multi', `&query=${e.target.value}`);
                document.getElementById('listTitle').innerText = `Nəticə: ${e.target.value}`;
            }
        });

        fetchData('/trending/all/day');
    </script>
</body>
</html>
