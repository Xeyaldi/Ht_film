<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeyal Film Cenneti | Full HD İzle</title>
    
    <meta property="og:title" content="Xeyal Film Cenneti">
    <meta property="og:description" content="Full HD film və serial izləmə platforması">
    <meta name="description" content="Ən son filmləri və serialları Full HD keyfiyyətdə izləyin.">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #9d00ff;
            --bg: #0a0a0c;
            --sidebar-bg: #111116;
            --card-bg: #16161d;
        }

        body {
            background-color: var(--bg); color: #ccc; font-family: 'Roboto', sans-serif; margin: 0;
        }

        header {
            background: #000; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-purple); position: sticky; top: 0; z-index: 1000;
        }
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neon-blue); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }
        .logo i { color: var(--neon-purple); font-size: 25px; }

        .search-box {
            background: #1a1a1a; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; padding: 5px 15px;
        }
        .search-box input { background: transparent; border: none; color: #fff; padding: 8px; outline: none; width: 200px; }

        .container { display: flex; gap: 20px; padding: 20px 5%; flex-wrap: wrap; }
        main { flex: 3; min-width: 300px; }
        aside { flex: 1; min-width: 280px; }

        .top-slider {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none;
        }
        .slide-card {
            min-width: 220px; height: 130px; border-radius: 6px; position: relative; overflow: hidden;
            border: 1px solid #222; cursor: pointer;
        }
        .slide-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .slide-meta { position: absolute; bottom: 8px; left: 8px; font-size: 11px; color: #fff; }

        .upcoming-section { margin: 25px 0; }
        .upcoming-circles { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .circle-item { text-align: center; min-width: 80px; }
        .circle-item img {
            width: 75px; height: 75px; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple);
        }
        .circle-item p { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; }

        .grid-header { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; color: var(--neon-blue); display: flex; justify-content: space-between; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .m-card { background: var(--card-bg); border-radius: 6px; overflow: hidden; position: relative; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .m-card:hover { transform: scale(1.03); border: 1px solid var(--neon-blue); }
        .m-card img { width: 100%; height: 230px; object-fit: cover; }
        .m-card .rating { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); color: #f5c518; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .m-card .info { padding: 8px; text-align: center; }
        .m-card h4 { margin: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Yeni Əlavə: TV Bölüm Seçimi */
        .tv-controls { display: none; gap: 10px; margin: 10px 0; background: #1a1a1a; padding: 10px; border-radius: 5px; }
        .tv-controls select { background: #333; color: #fff; border: 1px solid var(--neon-blue); padding: 5px; border-radius: 4px; }

        .side-block { background: var(--sidebar-bg); border-radius: 6px; padding: 15px; margin-bottom: 20px; border-left: 3px solid var(--neon-purple); }
        .side-title { color: #fff; font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        
        .genre-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .genre-btn { background: #1e1e26; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer; text-align: center; }
        .genre-btn:hover { background: var(--neon-purple); color: #fff; }

        .robot-btn { background: #d92323; color: #fff; text-align: center; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
        .player-content { max-width: 1000px; margin: auto; }
        iframe { width: 100%; height: 500px; border: 2px solid var(--neon-blue); border-radius: 8px; background: #000; }

        /* Skeleton Yüklənmə Effekti */
        .skeleton { background: #222; animation: blink 1.5s infinite; border-radius: 6px; }
        @keyframes blink { 50% { opacity: 0.5; } }

        @media (max-width: 768px) { aside { display: none; } .container { padding: 10px; } iframe { height: 250px; } }
    </style>
</head>
<body>

<header>
    <a href="javascript:location.reload()" class="logo"><i class="fas fa-fire"></i> XEYAL FİLM CENNETİ</a>
    <div class="search-box">
        <input type="text" id="srch" placeholder="Film ara...">
        <i class="fas fa-search" style="color: #666; cursor:pointer;" onclick="performSearch()"></i>
    </div>
</header>

<div class="container">
    <main>
        <div id="historySection" style="display:none; margin-bottom: 25px;">
            <div class="grid-header">🕒 SON BAXDIQLARINIZ</div>
            <div class="top-slider" id="historyList"></div>
        </div>

        <div class="top-slider" id="topSlider"></div>

        <div class="upcoming-section">
            <div class="grid-header">🎬 YAXINDA GƏLƏCƏK FİLMLƏR</div>
            <div class="upcoming-circles" id="upcomingList"></div>
        </div>

        <div class="grid-header" id="mainTitle">🔥 SON ƏLAVƏ OLUNANLAR</div>
        <div class="movie-grid" id="mainGrid"></div>
    </main>

    <aside>
        <div class="robot-btn"><i class="fas fa-robot"></i> FİLM ROBOTU</div>
        <div class="side-block">
            <div class="side-title"><i class="fas fa-star" style="color: #f5c518;"></i> NETDƏ İLK</div>
            <div id="sideNet" style="font-size: 12px;">Yüklənir...</div>
        </div>

        <div class="side-block">
            <div class="side-title"><i class="fas fa-list"></i> JANRLAR</div>
            <div class="genre-list" id="sideGenres"></div>
        </div>
    </aside>
</div>

<div id="modal" class="modal">
    <div class="player-content">
        <span onclick="closeP()" style="color: #fff; font-size: 40px; cursor: pointer; float: right; margin-bottom:10px;">&times;</span>
        <iframe id="ifr" src="" allowfullscreen></iframe>
        
        <div class="tv-controls" id="tvControls">
            Sezon: <select id="seasonSel" onchange="updateTV()"></select>
            Bölüm: <select id="episodeSel" onchange="updateTV()"></select>
        </div>

        <div style="margin-top: 15px; background: #111; padding: 20px; border-radius: 8px;">
            <button onclick="setS(1)" style="padding: 10px 20px; cursor:pointer; background:var(--neon-blue); border:none; color:#000; font-weight:bold;">Server 1</button>
            <button onclick="setS(2)" style="padding: 10px 20px; cursor:pointer; background:var(--neon-purple); border:none; color:#fff; font-weight:bold;">Server 2</button>
            <h2 id="mT" style="color: var(--neon-blue); margin-top:20px;"></h2>
            <p id="mD" style="font-size: 14px; line-height: 1.6;"></p>
        </div>
    </div>
</div>

<script>
    const KEY = 'c972e47d1574ac86dfe1d93d7e4a0b35';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    let curID, curType, curS = 1, curEp = 1;

    window.onload = () => {
        loadSlider();
        loadUpcoming();
        loadMain('/trending/all/day');
        loadGenres();
        loadHistory();
        loadSideNet();
    };

    function loadSideNet() {
        fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${KEY}&language=tr-TR`)
            .then(r => r.json())
            .then(d => {
                const side = document.getElementById('sideNet');
                side.innerHTML = d.results.slice(0, 3).map(m => `<p>• ${m.title}</p>`).join('');
            });
    }

    async function loadSlider() {
        const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const slider = document.getElementById('topSlider');
        data.results.slice(0, 6).forEach(m => {
            const div = document.createElement('div');
            div.className = 'slide-card';
            div.innerHTML = `<img src="${IMG + m.backdrop_path}"><div class="slide-meta">⭐ ${m.vote_average.toFixed(1)} | ${m.title}</div>`;
            div.onclick = () => openP(m.id, 'movie');
            slider.appendChild(div);
        });
    }

    async function loadUpcoming() {
        const res = await fetch(`https://api.themoviedb.org/3/movie/upcoming?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const list = document.getElementById('upcomingList');
        data.results.slice(0, 8).forEach(m => {
            const div = document.createElement('div');
            div.className = 'circle-item';
            div.innerHTML = `<img src="${IMG + m.poster_path}"><p>${m.title}</p>`;
            div.onclick = () => openP(m.id, 'movie');
            list.appendChild(div);
        });
    }

    async function loadMain(path, query = '', title = '🔥 SON ƏLAVƏ OLUNANLAR') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '<div class="skeleton" style="height:300px; width:100%;"></div>'.repeat(8);
        document.getElementById('mainTitle').innerText = title;

        const res = await fetch(`https://api.themoviedb.org/3${path}?api_key=${KEY}&language=tr-TR${query}`);
        const data = await res.json();
        
        if (!data.results || data.results.length === 0) {
            grid.innerHTML = `<p style="color:var(--neon-blue); grid-column: 1/-1; text-align:center;">Heç bir nəticə tapılmadı :(</p>`;
            return;
        }

        grid.innerHTML = '';
        data.results.forEach(m => {
            if(!m.poster_path) return;
            const card = document.createElement('div');
            card.className = 'm-card';
            card.innerHTML = `<div class="rating">IMDB ${m.vote_average ? m.vote_average.toFixed(1) : 'N/A'}</div><img src="${IMG + m.poster_path}"><div class="info"><h4>${m.title || m.name}</h4></div>`;
            card.onclick = () => openP(m.id, m.media_type || (m.title ? 'movie' : 'tv'));
            grid.appendChild(card);
        });
    }

    async function loadGenres() {
        const res = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const list = document.getElementById('sideGenres');
        data.genres.slice(0, 16).forEach(g => {
            const btn = document.createElement('div');
            btn.className = 'genre-btn';
            btn.innerText = g.name;
            btn.onclick = () => loadMain('/discover/movie', `&with_genres=${g.id}`, g.name);
            list.appendChild(btn);
        });
    }

    async function openP(id, type) {
        curID = id; curType = type; curS = 1; curEp = 1;
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${KEY}&language=tr-TR`);
        const m = await res.json();
        
        document.getElementById('mT').innerText = m.title || m.name;
        document.getElementById('mD').innerText = m.overview ? m.overview.substring(0, 300) + "..." : "Məlumat tapılmadı.";
        
        const tvC = document.getElementById('tvControls');
        if (type === 'tv') {
            tvC.style.display = 'flex';
            setupTV(m);
        } else {
            tvC.style.display = 'none';
        }

        addToHistory(m, type);
        setS(1);
        document.getElementById('modal').style.display = 'block';
    }

    function setupTV(m) {
        const sSel = document.getElementById('seasonSel');
        const eSel = document.getElementById('episodeSel');
        sSel.innerHTML = ''; eSel.innerHTML = '';
        
        for(let i=1; i<=m.number_of_seasons; i++) {
            sSel.innerHTML += `<option value="${i}">${i}. Sezon</option>`;
        }
        updateEpisodes(1, m.id);
    }

    async function updateEpisodes(s, id) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const eSel = document.getElementById('episodeSel');
        eSel.innerHTML = '';
        data.episodes.forEach(e => {
            eSel.innerHTML += `<option value="${e.episode_number}">${e.episode_number}. Bölüm: ${e.name}</option>`;
        });
    }

    function updateTV() {
        curS = document.getElementById('seasonSel').value;
        curEp = document.getElementById('episodeSel').value;
        if(event.target.id === 'seasonSel') updateEpisodes(curS, curID);
        setS(1);
    }

    function setS(s) {
        const b = s === 1 ? 'https://vidsrc.to/embed' : 'https://vidsrc.xyz/embed';
        const url = curType === 'movie' ? `${b}/movie/${curID}` : `${b}/tv/${curID}/${curS}/${curEp}`;
        document.getElementById('ifr').src = url;
    }

    function closeP() { document.getElementById('modal').style.display = 'none'; document.getElementById('ifr').src = ''; }

    function performSearch() {
        const val = document.getElementById('srch').value;
        if(val) loadMain('/search/multi', `&query=${encodeURIComponent(val)}`, `Axtarış: ${val}`);
    }

    document.getElementById('srch').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };

    // LOCAL STORAGE - Keçmiş Funksiyası
    function addToHistory(m, type) {
        let history = JSON.parse(localStorage.getItem('xeyal_history') || '[]');
        history = history.filter(item => item.id !== m.id);
        history.unshift({id: m.id, title: m.title || m.name, img: m.backdrop_path, type: type});
        localStorage.setItem('xeyal_history', JSON.stringify(history.slice(0, 10)));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('xeyal_history') || '[]');
        const container = document.getElementById('historySection');
        const list = document.getElementById('historyList');
        if(history.length > 0) {
            container.style.display = 'block';
            list.innerHTML = '';
            history.forEach(m => {
                const div = document.createElement('div');
                div.className = 'slide-card';
                div.innerHTML = `<img src="${IMG + m.img}"><div class="slide-meta">${m.title}</div>`;
                div.onclick = () => openP(m.id, m.type);
                list.appendChild(div);
            });
        }
    }
</script>
</body>
</html>
