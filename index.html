<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XEYAL FİLM CENNETİ | Premium Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #030305;
            --accent: #00f2ff; /* Cyber Cyan */
            --purple: #7000ff; /* Electric Purple */
            --card-bg: #0d0d12;
            --text-gray: #a0a0ab;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-shadow: 0 0 20px rgba(112, 0, 255, 0.3);
        }

        body {
            background-color: var(--main-bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SİNEMATİK NAVBAR --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 6%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05); box-sizing: border-box;
            transition: 0.4s;
        }

        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none; letter-spacing: 1px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }

        .search-container {
            position: relative; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
            padding: 10px 15px; display: flex; align-items: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-container:focus-within {
            border-color: var(--accent); width: 350px; box-shadow: var(--neon-shadow);
        }

        .search-container input {
            background: transparent; border: none; color: white; outline: none;
            width: 200px; font-size: 15px; margin-left: 10px;
        }

        /* --- HERO & CATEGORIES --- */
        .page-header { padding: 140px 6% 20px; }
        .category-scroll {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 25px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-item {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 24px; border-radius: 12px; cursor: pointer;
            white-space: nowrap; transition: 0.4s; font-weight: 600; font-size: 14px;
        }

        .cat-item:hover, .cat-item.active {
            background: linear-gradient(135deg, var(--purple), var(--accent));
            color: #000; border-color: transparent; transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.2);
        }

        /* --- SİNEMATİK QRİD --- */
        .grid-container { padding: 0 6% 80px; }
        .section-title {
            font-size: 24px; font-weight: 800; margin-bottom: 30px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-title::after { content: ''; height: 2px; flex: 1; background: linear-gradient(to right, var(--purple), transparent); }

        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 35px;
        }

        .movie-card {
            position: relative; border-radius: 20px; overflow: hidden;
            aspect-ratio: 2/3; cursor: pointer; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: #111; border: 1px solid rgba(255,255,255,0.03);
        }

        .movie-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .movie-card:hover img { filter: brightness(0.4) blur(2px); }

        .card-overlay {
            position: absolute; inset: 0; padding: 25px;
            display: flex; flex-direction: column; justify-content: flex-end;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0; transition: 0.4s;
        }
        .movie-card:hover .card-overlay { opacity: 1; }

        .imdb-pill {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 242, 255, 0.9); color: #000;
            padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 13px;
        }

        /* --- PREMİUM PLAYER MODAL --- */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(25px);
            overflow-y: auto; padding: 40px 0;
        }

        .modal-content { width: 92%; max-width: 1250px; margin: 0 auto; }
        
        .player-frame {
            background: #000; border-radius: 24px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 100px rgba(112, 0, 255, 0.2);
            position: relative;
        }
        iframe { width: 100%; height: 650px; border: none; }

        .control-panel {
            background: rgba(13, 13, 18, 0.6); border: 1px solid rgba(255,255,255,0.05);
            padding: 35px; border-radius: 24px; margin-top: 25px;
        }

        .server-tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .srv-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 30px; border-radius: 12px; cursor: pointer; transition: 0.3s;
            font-weight: 700; font-size: 14px;
        }
        .srv-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* BÖLÜM QRİDİ */
        .episode-section { margin-top: 30px; display: none; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 12px; }
        .ep-card {
            background: rgba(255,255,255,0.05); padding: 15px; text-align: center;
            border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }
        .ep-card:hover, .ep-card.active { background: var(--purple); border-color: var(--accent); transform: scale(1.1); }

        .close-player {
            float: right; font-size: 35px; cursor: pointer; color: var(--text-gray);
            margin-bottom: 20px; transition: 0.3s;
        }
        .close-player:hover { color: #fff; transform: rotate(90deg); }

        .movie-details h1 { font-family: 'Orbitron'; font-size: 38px; margin: 0 0 15px; background: linear-gradient(var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .movie-details p { color: var(--text-gray); font-size: 17px; line-height: 1.8; max-width: 900px; }

        @media (max-width: 768px) { iframe { height: 350px; } .modal-content { width: 98%; } }
    </style>
</head>
<body>

    <header id="navbar">
        <a href="#" class="logo" onclick="location.reload()">XEYAL FİLM</a>
        <div class="search-container">
            <i class="fas fa-search" style="color: var(--accent);"></i>
            <input type="text" id="searchInput" placeholder="Premium axtarış...">
        </div>
    </header>

    <div class="page-header">
        <div class="category-scroll" id="genreList">
            <div class="cat-item active" onclick="loadContent('/trending/all/week')">Trendlər</div>
        </div>
    </div>

    <div class="grid-container">
        <h2 class="section-title" id="listTitle">Həftənin Ən Yaxşıları</h2>
        <div class="movie-grid" id="mainGrid"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-player" onclick="closeModal()">&times;</span>
            <div class="player-frame">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>

            <div class="control-panel">
                <div class="server-tabs">
                    <div class="srv-btn active" id="s1">MƏNBƏ 1</div>
                    <div class="srv-btn" id="s2">MƏNBƏ 2</div>
                </div>

                <div id="tvPanel" class="episode-section">
                    <h4 style="margin-bottom: 20px; color: var(--accent); font-family: 'Orbitron';">BÖLÜMLƏR</h4>
                    <div class="ep-grid" id="episodes"></div>
                </div>

                <div class="movie-details">
                    <h1 id="mTitle"></h1>
                    <p id="mDesc"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'c972e47d1574ac86dfe1d93d7e4a0b35';
        const BASE = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/w500';

        window.onload = () => {
            loadContent('/trending/all/week');
            loadGenres();
        };

        async function loadGenres() {
            const res = await fetch(`${BASE}/genre/movie/list?api_key=${API_KEY}&language=az-AZ`);
            const data = await res.json();
            const container = document.getElementById('genreList');
            data.genres.forEach(g => {
                const div = document.createElement('div');
                div.className = 'cat-item';
                div.innerText = g.name;
                div.onclick = () => {
                    loadContent('/discover/movie', `&with_genres=${g.id}`);
                    document.getElementById('listTitle').innerText = `${g.name} Kolleksiyası`;
                    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                };
                container.appendChild(div);
            });
        }

        async function loadContent(path, query = '') {
            const res = await fetch(`${BASE}${path}?api_key=${API_KEY}&language=az-AZ${query}`);
            const data = await res.json();
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            data.results.forEach(m => {
                const isTV = (m.media_type === 'tv' || m.first_air_date) ? true : false;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="imdb-pill">⭐ ${m.vote_average.toFixed(1)}</div>
                    <img src="${IMG + m.poster_path}" alt="">
                    <div class="card-overlay">
                        <h3 style="margin:0; font-size:18px;">${m.title || m.name}</h3>
                        <p style="font-size:12px; color:var(--accent); margin:5px 0 0;">${isTV ? 'TV SERIAL' : 'BƏDİİ FİLM'}</p>
                    </div>
                `;
                card.onclick = () => openCinema(m.id, isTV ? 'tv' : 'movie');
                grid.appendChild(card);
            });
        }

        async function openCinema(id, type) {
            const res = await fetch(`${BASE}/${type}/${id}?api_key=${API_KEY}&language=az-AZ`);
            const data = await res.json();

            document.getElementById('mTitle').innerText = data.title || data.name;
            document.getElementById('mDesc').innerText = data.overview;
            const player = document.getElementById('mainPlayer');
            const tvPanel = document.getElementById('tvPanel');

            const setSource = (srv) => {
                const url = srv === 1 ? 'https://vidsrc.to/embed' : 'https://vidsrc.xyz/embed';
                player.src = `${url}/${type}/${id}${type==='tv'?'/1/1':''}`;
                document.querySelectorAll('.srv-btn').forEach((b,i) => b.classList.toggle('active', i+1===srv));
            };

            setSource(1);
            document.getElementById('s1').onclick = () => setSource(1);
            document.getElementById('s2').onclick = () => setSource(2);

            if(type === 'tv') {
                tvPanel.style.display = 'block';
                loadEpisodes(id, 1);
            } else { tvPanel.style.display = 'none'; }

            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        async function loadEpisodes(id, sNum) {
            const res = await fetch(`${BASE}/tv/${id}/season/${sNum}?api_key=${API_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('episodes');
            grid.innerHTML = '';
            data.episodes.forEach(ep => {
                const div = document.createElement('div');
                div.className = 'ep-card';
                div.innerText = ep.episode_number;
                div.onclick = () => {
                    document.getElementById('mainPlayer').src = `https://vidsrc.to/embed/tv/${id}/${sNum}/${ep.episode_number}`;
                    document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                };
                grid.appendChild(div);
            });
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInput').onkeypress = (e) => {
            if(e.key === 'Enter') loadContent('/search/multi', `&query=${encodeURIComponent(e.target.value)}`);
        };

        // Scroll effekt
        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if(window.scrollY > 50) nav.style.background = "rgba(3, 3, 5, 0.95)";
            else nav.style.background = "rgba(3, 3, 5, 0.7)";
        };
    </script>
</body>
</html>
