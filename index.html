<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT CINEMA | Dünyanın Filmi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">HT<span>CINEMA</span></div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Film axtar...">
                <button onclick="searchMovies()"><i class="fas fa-search"></i></button>
            </div>
            <div class="lang-switcher">
                <span onclick="changeLang('az')">AZ</span>
                <span onclick="changeLang('tr')">TR</span>
                <span onclick="changeLang('en')">EN</span>
            </div>
        </div>
    </header>

    <main>
        <div id="genre-tags" class="genres">
            </div>

        <h2 id="section-title">Populyar Filmlər</h2>
        <div id="movie-grid" class="movie-grid">
            </div>
    </main>

    <div id="movie-modal" class="modal">
        <span class="close">&times;</span>
        <div class="modal-content" id="modal-data">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
