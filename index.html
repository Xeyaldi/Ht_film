<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeyal Film | Netflix Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --netflix-blue: #0088cc;
            --bg-black: #141414;
        }

        body { background-color: var(--bg-black); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 4%; display: flex; align-items: center; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%); transition: 0.5s; box-sizing: border-box;
        }
        nav.black { background: #000; }
        .logo { color: var(--netflix-blue); font-size: 30px; font-weight: bold; text-decoration: none; margin-right: 25px; }
        .nav-links { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; flex-grow: 1; }
        .nav-links li a { color: #e5e5e5; text-decoration: none; font-size: 14px; }

        /* --- BANNER --- */
        .banner {
            height: 80vh; background-size: cover; background-position: center center; display: flex;
            flex-direction: column; justify-content: center; padding-left: 4%; position: relative;
        }
        .banner__title { font-size: 3.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .banner__description { line-height: 1.3; font-size: 1.1rem; max-width: 450px; height: 80px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .banner__button {
            cursor: pointer; color: #fff; border: none; font-weight: 700; border-radius: 4px;
            padding: 0.6rem 2.5rem; margin-right: 1rem; background-color: rgba(51, 51, 51, 0.6); transition: 0.3s;
        }
        .banner__button:hover { background-color: #fff; color: #000; }
        .banner--fadeBottom { height: 10rem; background-image: linear-gradient(180deg, transparent, rgba(37,37,37,0.6), var(--bg-black)); position: absolute; bottom: 0; width: 100%; left: 0; }

        /* --- ROWS & TOP 10 --- */
        .row { margin-left: 4%; margin-top: 20px; position: relative; }
        .row__title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .row__posters { display: flex; overflow-y: hidden; overflow-x: scroll; padding: 20px 0; scrollbar-width: none; }
        .row__posters::-webkit-scrollbar { display: none; }
        
        .row__poster {
            max-height: 160px; object-fit: contain; margin-right: 12px; transition: transform 450ms; cursor: pointer; border-radius: 4px;
        }
        .row__poster:hover { transform: scale(1.15); z-index: 100; border: 2px solid var(--netflix-blue); }

        /* Top 10 Rəqəmləri */
        .top10-item { position: relative; display: flex; align-items: center; min-width: 240px; }
        .top10-number {
            font-size: 180px; font-weight: 900; line-height: 1; color: #141414;
            -webkit-text-stroke: 3px #555; margin-right: -40px; z-index: 1;
        }
        .top10-img { height: 160px; z-index: 2; border-radius: 4px; transition: 0.3s; }
        .top10-item:hover .top10-img { transform: scale(1.1); border: 2px solid var(--netflix-blue); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { width: 900px; margin: 40px auto; background: #181818; border-radius: 12px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 40px; cursor: pointer; z-index: 100; }
        iframe { width: 100%; height: 500px; border: none; }
        .modal-body { padding: 40px; }
        .cast-list { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; }
        .cast-card { text-align: center; min-width: 90px; }
        .cast-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }

        .fav-plus { position: absolute; top: 5px; right: 15px; font-size: 24px; color: #fff; z-index: 110; cursor: pointer; transition: 0.3s; }
        .fav-plus:hover { color: var(--netflix-blue); transform: scale(1.3); }

        /* Axtarış */
        .nav-right { display: flex; align-items: center; gap: 20px; margin-right: 20px; }
        .search-box { border: 1px solid #fff; padding: 4px 10px; background: rgba(0,0,0,0.5); display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: #fff; outline: none; width: 140px; font-size: 13px; }

        @media (max-width: 768px) { .modal-content { width: 95%; } .banner__title { font-size: 2rem; } }
    </style>
</head>
<body>

<nav id="nav">
    <a href="javascript:location.reload()" class="logo">XEYAL FİLM</a>
    <ul class="nav-links">
        <li><a href="#" onclick="loadCategory('/trending/all/week', 'Trendlər')">Ana Səhifə</a></li>
        <li><a href="#" onclick="loadCategory('/discover/tv', 'Seriallar')">Seriallar</a></li>
        <li><a href="#" onclick="loadCategory('/discover/movie', 'Filmlər')">Filmlər</a></li>
        <li><a href="#" onclick="loadCategory('/discover/movie', 'Türk Filmləri', '&with_original_language=tr')">Türk Filmləri</a></li>
    </ul>
    <div class="nav-right">
        <div class="search-box">
            <i class="fas fa-search" style="margin-right:8px; cursor:pointer;" onclick="performSearch()"></i>
            <input type="text" id="srch" placeholder="Axtar...">
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" width="32" style="border-radius:4px;">
    </div>
</nav>

<header class="banner" id="banner">
    <div style="margin-top: 100px;">
        <h1 class="banner__title" id="bannerTitle">Yüklənir...</h1>
        <div class="banner__buttons">
            <button class="banner__button" id="playBtn"><i class="fas fa-play"></i> Oynat</button>
            <button class="banner__button"><i class="fas fa-plus"></i> Siyahım</button>
        </div>
        <p class="banner__description" id="bannerDesc"></p>
    </div>
    <div class="banner--fadeBottom"></div>
</header>

<div class="row" id="favSection" style="display:none;">
    <h2 class="row__title">Sizin Siyahınız</h2>
    <div class="row__posters" id="favRow"></div>
</div>

<div class="row">
    <h2 class="row__title">Dünyada Top 10</h2>
    <div class="row__posters" id="top10Row"></div>
</div>

<div class="row">
    <h2 class="row__title" id="mainTitle">Trenddə Olanlar</h2>
    <div class="row__posters" id="mainRow"></div>
</div>

<div class="row">
    <h2 class="row__title">Yaxında Gələcəklər</h2>
    <div class="row__posters" id="upcomingRow"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeP()">&times;</span>
        <iframe id="ifr" src="" allowfullscreen></iframe>
        <div class="modal-body">
            <h2 id="mT" style="color:var(--netflix-blue); font-size:35px; margin:0;"></h2>
            <p id="mD" style="color:#999; line-height:1.6; font-size:16px; margin-top:15px;"></p>
            
            <h4 style="margin-top:30px; border-left:4px solid var(--netflix-blue); padding-left:10px;">AKTYOR HEYƏTİ</h4>
            <div class="cast-list" id="mCast"></div>

            <div style="margin-top:20px;">
                <button class="banner__button" style="background:var(--netflix-blue); color:#000;" onclick="setS(1)">Server 1</button>
                <button class="banner__button" onclick="setS(2)">Server 2</button>
                <button class="banner__button" style="background:#ff4757;" id="btnTrailer" onclick="openTrailer()">Fragman</button>
            </div>

            <div style="margin-top:40px; background:#222; padding:20px; border-radius:8px;">
                <h4>ŞƏRHLƏR</h4>
                <div id="comList"></div>
                <input type="text" id="comUser" placeholder="Adınız" style="background:#111; border:none; color:#fff; padding:10px; width:200px; border-radius:4px; margin-top:10px;">
                <textarea id="comText" placeholder="Fikriniz..." style="background:#111; border:none; color:#fff; padding:10px; width:100%; border-radius:4px; height:60px; margin-top:10px;"></textarea>
                <button class="banner__button" style="margin-top:10px;" onclick="addComment()">Göndər</button>
            </div>
        </div>
    </div>
</div>

<script>
    const KEY = 'c972e47d1574ac86dfe1d93d7e4a0b35';
    const IMG = 'https://image.tmdb.org/t/p/original';
    const POSTER = 'https://image.tmdb.org/t/p/w500';
    let curID, curType, curTrailer = "";

    window.onscroll = () => {
        const nav = document.getElementById('nav');
        if (window.scrollY > 100) nav.classList.add('black');
        else nav.classList.remove('black');
    };

    window.onload = () => {
        loadBanner();
        loadTop10();
        loadRow('/movie/upcoming', 'upcomingRow');
        loadCategory('/trending/all/week', 'Trenddə Olanlar');
        loadFavorites();
    };

    async function loadBanner() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const m = data.results[Math.floor(Math.random() * 5)];
        document.getElementById('banner').style.backgroundImage = `linear-gradient(to right, rgba(20,20,20,0.9), transparent), url(${IMG + m.backdrop_path})`;
        document.getElementById('bannerTitle').innerText = m.title || m.name;
        document.getElementById('bannerDesc').innerText = m.overview;
        document.getElementById('playBtn').onclick = () => openP(m.id, m.media_type);
    }

    async function loadTop10() {
        const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const row = document.getElementById('top10Row');
        data.results.slice(0, 10).forEach((m, i) => {
            const div = document.createElement('div');
            div.className = 'top10-item';
            div.innerHTML = `<span class="top10-number">${i+1}</span><img src="${POSTER + m.poster_path}" class="top10-img" onclick="openP(${m.id}, 'movie')">`;
            row.appendChild(div);
        });
    }

    async function loadRow(path, rowId) {
        const res = await fetch(`https://api.themoviedb.org/3${path}?api_key=${KEY}&language=tr-TR`);
        const data = await res.json();
        const row = document.getElementById(rowId);
        data.results.forEach(m => {
            const container = document.createElement('div');
            container.style.position = 'relative';
            container.innerHTML = `<i class="fas fa-plus fav-plus" onclick="toggleFav(event, ${m.id}, '${m.title || m.name}', '${m.backdrop_path}', 'movie')"></i><img src="${POSTER + m.backdrop_path}" class="row__poster" onclick="openP(${m.id}, 'movie')">`;
            row.appendChild(container);
        });
    }

    async function loadCategory(path, title, query = '') {
        const row = document.getElementById('mainRow');
        document.getElementById('mainTitle').innerText = title;
        row.innerHTML = '';
        const res = await fetch(`https://api.themoviedb.org/3${path}?api_key=${KEY}&language=tr-TR${query}`);
        const data = await res.json();
        data.results.forEach(m => {
            const img = document.createElement('img');
            img.src = POSTER + (m.backdrop_path || m.poster_path);
            img.className = 'row__poster';
            img.onclick = () => openP(m.id, m.media_type || (m.title ? 'movie' : 'tv'));
            row.appendChild(img);
        });
    }

    async function openP(id, type) {
        curID = id; curType = type;
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${KEY}&language=tr-TR&append_to_response=credits,videos`);
        const m = await res.json();
        document.getElementById('mT').innerText = m.title || m.name;
        document.getElementById('mD').innerText = m.overview;
        
        document.getElementById('mCast').innerHTML = m.credits.cast.slice(0, 8).map(c => `
            <div class="cast-card">
                <img src="${c.profile_path ? POSTER + c.profile_path : 'https://via.placeholder.com/70'}">
                <p style="font-size:11px; margin-top:5px;">${c.name}</p>
            </div>`).join('');

        const trailer = m.videos.results.find(v => v.type === 'Trailer');
        curTrailer = trailer ? `https://www.youtube.com/embed/${trailer.key}` : "";
        document.getElementById('btnTrailer').style.display = curTrailer ? "inline-block" : "none";
        
        setS(1);
        document.getElementById('modal').style.display = 'block';
        loadComments(id);
    }

    function setS(s) {
        const b = s === 1 ? 'https://vidsrc.to/embed' : 'https://vidsrc.xyz/embed';
        document.getElementById('ifr').src = `${b}/${curType}/${curID}`;
    }

    function closeP() { document.getElementById('modal').style.display = 'none'; document.getElementById('ifr').src = ''; }

    function toggleFav(e, id, title, img, type) {
        e.stopPropagation();
        let favs = JSON.parse(localStorage.getItem('x_favs') || '[]');
        const idx = favs.findIndex(f => f.id === id);
        if(idx > -1) favs.splice(idx, 1);
        else favs.unshift({id, title, img, type});
        localStorage.setItem('x_favs', JSON.stringify(favs));
        loadFavorites();
    }

    function loadFavorites() {
        const favs = JSON.parse(localStorage.getItem('x_favs') || '[]');
        const sec = document.getElementById('favSection');
        if(favs.length > 0) {
            sec.style.display = 'block';
            document.getElementById('favRow').innerHTML = favs.map(f => `<img src="${POSTER + f.img}" class="row__poster" onclick="openP(${f.id}, '${f.type}')">`).join('');
        } else sec.style.display = 'none';
    }

    function addComment() {
        const user = document.getElementById('comUser').value || "Anonim";
        const text = document.getElementById('comText').value;
        if(!text) return;
        let comments = JSON.parse(localStorage.getItem('x_comments') || '{}');
        if(!comments[curID]) comments[curID] = [];
        comments[curID].unshift({ user, text, date: new Date().toLocaleDateString() });
        localStorage.setItem('x_comments', JSON.stringify(comments));
        document.getElementById('comText').value = '';
        loadComments(curID);
    }

    function loadComments(id) {
        let comments = JSON.parse(localStorage.getItem('x_comments') || '{}');
        const list = document.getElementById('comList');
        list.innerHTML = (comments[id] || []).map(c => `<div style="margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;"><strong>${c.user}</strong> <small style="color:#555">${c.date}</small><p>${c.text}</p></div>`).join('');
    }

    function performSearch() {
        const v = document.getElementById('srch').value;
        if(v) loadCategory('/search/multi', `Nəticə: ${v}`, `&query=${encodeURIComponent(v)}`);
    }
    document.getElementById('srch').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };
</script>
</body>
</html>
