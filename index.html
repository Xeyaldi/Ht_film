<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeyal Film Cenneti | Premium Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-blue: #00d4ff;
            --main-purple: #9d00ff;
            --dark-bg: #050507;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(17, 17, 22, 0.8);
        }

        body { 
            background-color: var(--dark-bg); 
            color: #eee; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(157, 0, 255, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(0, 212, 255, 0.1), transparent);
        }

        ::-webkit-scrollbar { width: 8px; height: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--main-blue); border-radius: 10px; }

        header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            background: linear-gradient(to right, var(--main-blue), var(--main-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
        }

        .search-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 6px 20px;
            transition: 0.4s;
            position: relative;
        }
        .search-box:focus-within { border-color: var(--main-blue); background: rgba(255,255,255,0.15); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .search-box input { background: transparent; border: none; color: #fff; padding: 10px; outline: none; width: 250px; font-size: 14px; }

        #searchDropdown {
            position: absolute; top: 60px; left: 0; right: 0; 
            background: rgba(10,10,12,0.98); border: 1px solid var(--main-blue); 
            border-radius: 15px; z-index: 1001; display: none; 
            max-height: 400px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }

        .search-item {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
        }
        .search-item:hover { background: rgba(255,255,255,0.1); }
        .search-item img { width: 45px; height: 65px; border-radius: 8px; object-fit: cover; }

        /* Struktur Düzəlişi: Sağ boşluğu doldurmaq üçün */
        .container { padding: 20px 6%; }
        .top-layout { display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 20px; }
        main { flex: 3; min-width: 320px; }
        aside { flex: 1; min-width: 280px; }

        .grid-header { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 20px; 
            margin: 40px 0 20px; 
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .grid-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--main-blue), transparent); }

        /* Filmlər Grid - yan-yana düzülür və tam yayılır */
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            width: 100%;
        }

        .m-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
            cursor: pointer; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .m-card:hover { transform: translateY(-12px) scale(1.02); border-color: var(--main-blue); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .m-card img { width: 100%; height: 270px; object-fit: cover; transition: 0.5s; }
        
        .rating { 
            position: absolute; top: 12px; right: 12px; 
            background: rgba(0,0,0,0.85); color: #f5c518; 
            padding: 5px 10px; border-radius: 8px; 
            font-size: 12px; font-weight: bold; border: 1px solid rgba(245, 197, 24, 0.3);
        }

        .fav-btn { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; padding: 8px; border-radius: 50%; z-index: 5; transition: 0.3s; }
        .fav-active { color: #ff4757 !important; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; }
        .player-content { max-width: 1200px; margin: 40px auto; padding: 20px; }
        iframe { width: 100%; height: 600px; border-radius: 20px; border: 1px solid rgba(0, 212, 255, 0.3); background: #000; box-shadow: 0 0 50px rgba(0,0,0,1); }

        .server-select { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .server-btn { 
            background: #111; color: #fff; border: 1px solid #333; 
            padding: 10px 25px; border-radius: 50px; cursor: pointer; 
            transition: 0.3s; font-weight: 600; font-size: 13px;
        }
        .server-btn.active { background: var(--main-blue); color: #000; border-color: var(--main-blue); box-shadow: 0 0 15px var(--main-blue); }

        .side-card { 
            background: var(--glass); border-radius: 15px; padding: 20px; 
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .robot-btn { 
            background: linear-gradient(45deg, var(--main-purple), #6a00ff); 
            color: #fff; padding: 18px; border-radius: 15px; 
            text-align: center; font-weight: bold; cursor: pointer; 
            transition: 0.3s; box-shadow: 0 10px 20px rgba(157, 0, 255, 0.3);
        }

        .top-slider { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .slide-card {
            min-width: 260px; height: 150px; border-radius: 12px; overflow: hidden;
            position: relative; cursor: pointer; transition: 0.4s; flex-shrink: 0;
        }
        .slide-card img { width: 100%; height: 100%; object-fit: cover; }
        .slide-meta { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 15px; font-size: 13px; }

        @media (max-width: 768px) { .movie-grid { grid-template-columns: repeat(2, 1fr); } iframe { height: 350px; } .container { padding: 15px; } }
    </style>
</head>
<body>

<header>
    <a href="javascript:location.reload()" class="logo"><i class="fas fa-play-circle"></i> XEYAL FILM</a>
    <div class="search-box">
        <input type="text" id="srch" placeholder="Film, serial və ya aktyor...">
        <i class="fas fa-search" style="color: var(--main-blue); cursor:pointer;" onclick="performSearch()"></i>
        <div id="searchDropdown"></div>
    </div>
</header>

<div class="container">
    <div class="top-layout">
        <main>
            <div id="favSection" style="display:none;">
                <div class="grid-header"><i class="fas fa-heart" style="color:#ff4757"></i> SEVİMLİLƏR</div>
                <div class="top-slider" id="favList"></div>
            </div>
            <div id="historySection" style="display:none;">
                <div class="grid-header"><i class="fas fa-history" style="color:var(--main-blue)"></i> İZLƏMƏYƏ DAVAM ET</div>
                <div class="top-slider" id="historyList"></div>
            </div>
            <div class="grid-header"><i class="fas fa-star" style="color:#f5c518"></i> BU HƏFTƏ TRENDDƏ</div>
            <div class="top-slider" id="topSlider"></div>
            <div class="grid-header"><i class="fas fa-calendar-alt"></i> TEZLİKLƏ</div>
            <div id="upcomingList" style="display:flex; gap:20px; overflow-x:auto; padding:10px 0;"></div>
        </main>
        <aside>
            <div class="robot-btn" onclick="randomMovie()"><i class="fas fa-random"></i> MƏNƏ BİR FİLM ÖNƏR</div>
            <div class="side-card">
                <h4 style="margin-top:0; color:var(--main-blue);"><i class="fas fa-chart-line"></i> TOP 5</h4>
                <div id="sideNet" style="font-size: 14px; color:#aaa;"></div>
            </div>
            <div class="side-card">
                <h4 style="margin-top:0; color:var(--main-purple);"><i class="fas fa-film"></i> KATEQORİYALAR</h4>
                <div id="sideGenres" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            </div>
        </aside>
    </div>

    <div class="grid-header" id="mainTitle">🔥 SON ƏLAVƏLƏR</div>
    <div class="movie-grid" id="mainGrid">
        <div style="padding:50px; text-align:center; width:100%;">Filmlər hazırlanır...</div>
    </div>

    <div style="text-align:center; padding:50px;">
        <button onclick="loadNextPage()" style="background:var(--main-blue); color:#000; border:none; padding:15px 50px; border-radius:50px; font-weight:bold; cursor:pointer; font-family:'Orbitron';">DAHA ÇOX YÜKLƏ</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="player-content">
        <span onclick="closeP()" style="color:#fff; font-size:50px; cursor:pointer; float:right; line-height:0.5;">&times;</span>
        <h2 id="mT" style="font-family:'Orbitron'; margin:0 0 30px 0; color:var(--main-blue);"></h2>

        <div class="server-select">
            <button class="server-btn active" onclick="setServer('vidsrc', this)">SERVER 1</button>
            <button class="server-btn" onclick="setServer('vidsrcme', this)">SERVER 2</button>
            <button class="server-btn" onclick="setServer('super', this)">SERVER 3</button>
        </div>

        <iframe id="ifr" src="" allowfullscreen sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation"></iframe>

        <div id="tvControls" style="display:none; justify-content:center; gap:20px; margin-top:20px; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
            Sezon: <select id="seasonSel" onchange="updateTV()" style="background:#222; color:#fff; padding:8px; border-radius:8px; border:1px solid #444;"></select>
            Bölüm: <select id="episodeSel" onchange="updateTV()" style="background:#222; color:#fff; padding:8px; border-radius:8px; border:1px solid #444;"></select>
        </div>

        <div style="margin-top:40px; background:rgba(255,255,255,0.03); padding:30px; border-radius:20px; border:1px solid rgba(255,255,255,0.05);">
            <p id="mD" style="line-height:1.8; color:#bbb; font-size:16px;"></p>
            <h3 style="color:var(--main-blue); margin-top:40px;">AKTYORLAR</h3>
            <div id="mCast" style="display:flex; gap:20px; overflow-x:auto; padding:20px 0;"></div>

            <div style="margin-top:50px; border-top:1px solid rgba(255,255,255,0.1); padding-top:30px;">
                <h3 style="color:var(--main-purple);">ŞƏRHLƏR</h3>
                <input type="text" id="comUser" placeholder="Adınız" style="background:#111; border:1px solid #333; color:#fff; padding:12px; border-radius:10px; width:250px; margin-bottom:15px; display:block;">
                <textarea id="comText" placeholder="Film haqqında fikirləriniz..." style="background:#111; border:1px solid #333; color:#fff; padding:15px; border-radius:10px; width:100%; height:100px; margin-bottom:15px; box-sizing:border-box;"></textarea>
                <button onclick="addComment()" style="background:var(--main-purple); color:#fff; border:none; padding:12px 30px; border-radius:10px; cursor:pointer; font-weight:bold;">GÖNDƏR</button>
                <div id="comList" style="margin-top:30px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const KEY = 'c972e47d1574ac86dfe1d93d7e4a0b35';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    
    let curID, curType, curS = 1, curEp = 1, currentServer = 'vidsrc';
    let currentPage = 1, currentPath = '/trending/all/day', currentQuery = '';

    window.onload = () => {
        loadSlider(); loadUpcoming(); loadMain('/trending/all/day');
        loadGenres(); loadHistory(); loadFavorites(); loadSideNet();
    };

    function setServer(srv, btn) {
        currentServer = srv;
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        autoSetSource();
    }

    function autoSetSource() {
        let url = "";
        if(currentServer === 'vidsrc') {
            url = curType === 'movie' ? `https://vidsrc.to/embed/movie/${curID}` : `https://vidsrc.to/embed/tv/${curID}/${curS}/${curEp}`;
        } else if(currentServer === 'vidsrcme') {
            url = curType === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${curID}` : `https://vidsrc.me/embed/tv?tmdb=${curID}&sea=${curS}&epi=${curEp}`;
        } else {
            url = curType === 'movie' ? `https://multiembed.mov/?video_id=${curID}&tmdb=1` : `https://multiembed.mov/?video_id=${curID}&tmdb=1&s=${curS}&e=${curEp}`;
        }
        document.getElementById('ifr').src = url;
    }

    async function loadMain(path, query = '', title = '', append = false) {
        currentPath = path; currentQuery = query;
        const grid = document.getElementById('mainGrid');
        if(!append) { grid.innerHTML = ''; if(title) document.getElementById('mainTitle').innerText = title; currentPage = 1; }
        
        try {
            const res = await fetch(`https://api.themoviedb.org/3${path}?api_key=${KEY}&language=tr-TR${query}&page=${currentPage}`);
            const data = await res.json();
            
            data.results.forEach(m => {
                if(!m.poster_path) return;
                const isFav = getFavs().some(f => f.id === m.id);
                const card = document.createElement('div');
                card.className = 'm-card';
                card.innerHTML = `
                    <i class="fas fa-heart fav-btn ${isFav ? 'fav-active' : ''}" onclick="toggleFav(event, ${m.id}, '${m.title || m.name}', '${m.poster_path}', '${m.media_type || 'movie'}')"></i>
                    <div class="rating">${m.vote_average.toFixed(1)}</div>
                    <img src="${IMG + m.poster_path}" loading="lazy">
                    <div class="info"><h4>${m.title || m.name}</h4></div>`;
                card.onclick = () => openP(m.id, m.media_type || (m.title ? 'movie' : 'tv'));
                grid.appendChild(card);
            });
        } catch(e) { console.error(e); }
    }

    function loadNextPage() { currentPage++; loadMain(currentPath, currentQuery, '', true); }

    const searchInput = document.getElementById('srch');
    const searchDropdown = document.getElementById('searchDropdown');

    searchInput.addEventListener('input', async (e) => {
        const query = e.target.value;
        if (query.length < 2) {
            searchDropdown.style.display = 'none';
            return;
        }

        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&language=tr-TR&query=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            if (data.results.length > 0) {
                searchDropdown.innerHTML = data.results.slice(0, 8).map(m => `
                    <div class="search-item" onclick="openP(${m.id}, '${m.media_type || (m.title ? 'movie' : 'tv')}')">
                        <img src="${m.poster_path ? IMG + m.poster_path : 'https://via.placeholder.com/45x65'}">
                        <div>
                            <div style="font-size:14px; font-weight:600; color:#fff;">${m.title || m.name}</div>
                            <div style="font-size:12px; color:#888;">${m.release_date ? m.release_date.split('-')[0] : ''}</div>
                        </div>
                    </div>`).join('');
                searchDropdown.style.display = 'block';
            } else {
                searchDropdown.style.display = 'none';
            }
        } catch (err) { console.error(err); }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-box')) searchDropdown.style.display = 'none';
    });

    function closeP() { 
        document.getElementById('modal').style.display = 'none'; 
        document.getElementById('ifr').src = ''; 
        document.body.style.overflow = 'auto';
    }
    
    function performSearch() {
        const v = document.getElementById('srch').value;
        if(v) {
            searchDropdown.style.display = 'none';
            loadMain('/search/multi', `&query=${encodeURIComponent(v)}`, `Axtarış nəticəsi: ${v}`);
        }
    }

    document.getElementById('srch').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };

    async function translateText(text) {
        if(!text) return "Açıqlama tapılmadı.";
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=az&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            return data[0].map(s => s[0]).join('');
        } catch(e) { return text; }
    }

    async function openP(id, type) {
        searchDropdown.style.display = 'none';
        curID = id; curType = type; curS = 1; curEp = 1;
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${KEY}&language=tr-TR&append_to_response=credits`);
        const m = await res.json();
        
        document.getElementById('mT').innerText = m.title || m.name;
        document.getElementById('mD').innerText = await translateText(m.overview);

        document.getElementById('mCast').innerHTML = m.credits.cast.slice(0, 10).map(c => `
            <div style="text-align:center; min-width:100px;">
                <img src="${c.profile_path ? IMG + c.profile_path : 'https://via.placeholder.com/100'}" style="width:80px; height:80px; border-radius:15px; object-fit:cover; border:1px solid rgba(255,255,255,0.1);">
                <p style="font-size:11px; margin-top:10px; color:#fff;">${c.name}</p>
            </div>`).join('');

        if (type === 'tv') { 
            document.getElementById('tvControls').style.display = 'flex'; 
            let sHtml = "";
            for(let i=1; i<=m.number_of_seasons; i++) sHtml += `<option value="${i}">${i}. Sezon</option>`;
            document.getElementById('seasonSel').innerHTML = sHtml;
            updateEpisodes(1, id);
        } else { 
            document.getElementById('tvControls').style.display = 'none'; 
        }

        addToHistory(m, type); loadComments(id); autoSetSource();
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function addToHistory(m, type) {
        let history = JSON.parse(localStorage.getItem('x_hist') || '[]');
        history = history.filter(h => h.id !== m.id);
        history = history.filter(h => h.id !== m.id);
        history.unshift({id: m.id, title: m.title || m.name, img: m.backdrop_path || m.poster_path, type});
        localStorage.setItem('x_hist', JSON.stringify(history.slice(0, 10)));
        loadHistory();
    }

    function loadHistory() {
        const hist = JSON.parse(localStorage.getItem('x_hist') || '[]');
        const sec = document.getElementById('historySection');
        if(hist.length > 0) {
            sec.style.display = 'block';
            document.getElementById('historyList').innerHTML = hist.map(h => `
                <div class="slide-card" onclick="openP(${h.id}, '${h.type}')">
                    <img src="${IMG + h.img}">
                    <div class="slide-meta">${h.title}</div>
                </div>`).join('');
        }
    }

    async function loadSlider() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${KEY}&language=tr-TR`);
            const data = await res.json();
            document.getElementById('topSlider').innerHTML = data.results.slice(0, 10).map(m => `
                <div class="slide-card" onclick="openP(${m.id}, 'movie')">
                    <img src="${IMG + m.backdrop_path}">
                    <div class="slide-meta"><b>${m.title}</b></div>
                </div>`).join('');
        } catch(e) { console.error(e); }
    }

    async function loadUpcoming() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/upcoming?api_key=${KEY}&language=tr-TR`);
            const data = await res.json();
            document.getElementById('upcomingList').innerHTML = data.results.slice(0, 10).map(m => `
                <div style="text-align:center; min-width:100px; cursor:pointer;" onclick="openP(${m.id}, 'movie')">
                    <img src="${IMG + m.poster_path}" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid var(--main-purple);">
                    <p style="font-size:11px; margin-top:10px; font-weight:bold;">${m.title}</p>
                </div>`).join('');
        } catch(e) { console.error(e); }
    }

    async function loadGenres() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${KEY}&language=tr-TR`);
            const data = await res.json();
            document.getElementById('sideGenres').innerHTML = data.genres.slice(0, 12).map(g => `
                <div class="server-btn" style="padding:8px; font-size:11px; text-align:center; cursor:pointer;" onclick="loadMain('/discover/movie', '&with_genres=${g.id}', '${g.name}')">${g.name}</div>`).join('');
        } catch(e) { console.error(e); }
    }

    function loadSideNet() {
        fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}`).then(r => r.json()).then(d => {
            document.getElementById('sideNet').innerHTML = d.results.slice(0, 5).map((m, index) => `
                <div style="padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer;" onclick="openP(${m.id}, 'movie')">
                    <span style="color:var(--main-blue); font-weight:bold; margin-right:10px;">0${index+1}</span> ${m.title}
                </div>`).join('');
        });
    }

    async function updateEpisodes(s, id) {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${KEY}&language=tr-TR`);
            const data = await res.json();
            document.getElementById('episodeSel').innerHTML = data.episodes.map(e => `<option value="${e.episode_number}">${e.episode_number}. Bölüm</option>`).join('');
        } catch(e) { console.error(e); }
    }

    function updateTV() {
        curS = document.getElementById('seasonSel').value;
        curEp = document.getElementById('episodeSel').value;
        if(event.target.id === 'seasonSel') updateEpisodes(curS, curID);
        autoSetSource();
    }

    function addComment() {
        const user = document.getElementById('comUser').value || "Anonim";
        const text = document.getElementById('comText').value;
        if(!text) return;
        let comments = JSON.parse(localStorage.getItem('x_comments') || '{}');
        if(!comments[curID]) comments[curID] = [];
        comments[curID].unshift({ user, text, date: new Date().toLocaleString() });
        localStorage.setItem('x_comments', JSON.stringify(comments));
        document.getElementById('comText').value = '';
        loadComments(curID);
    }

    function loadComments(id) {
        let comments = JSON.parse(localStorage.getItem('x_comments') || '{}');
        const list = document.getElementById('comList');
        const movieComments = comments[id] || [];
        list.innerHTML = movieComments.length === 0 ? '<p style="color:#555;">İlk şərhi sən yaz!</p>' : 
            movieComments.map(c => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:15px;">
                    <b style="color:var(--main-blue);">${c.user}</b> <small style="color:#666; float:right;">${c.date}</small>
                    <p style="margin:10px 0 0; font-size:14px;">${c.text}</p>
                </div>`).join('');
    }

    function getFavs() { return JSON.parse(localStorage.getItem('x_favs') || '[]'); }

    function toggleFav(e, id, title, img, type) {
        e.stopPropagation();
        let favs = getFavs();
        const idx = favs.findIndex(f => f.id === id);
        if(idx > -1) favs.splice(idx, 1);
        else favs.unshift({id, title, img, type});
        localStorage.setItem('x_favs', JSON.stringify(favs));
        e.target.classList.toggle('fav-active');
        loadFavorites();
    }

    function loadFavorites() {
        const favs = getFavs();
        const sec = document.getElementById('favSection');
        if(favs.length > 0) {
            sec.style.display = 'block';
            document.getElementById('favList').innerHTML = favs.map(f => `
                <div class="slide-card" onclick="openP(${f.id}, '${f.type}')">
                    <img src="${IMG + f.img}">
                    <div class="slide-meta">${f.title}</div>
                </div>`).join('');
        } else sec.style.display = 'none';
    }

    function randomMovie() { loadMain('/movie/top_rated', '', '🤖 ROBOTUN SEÇİMİ'); }
</script>
</body>
</html>
