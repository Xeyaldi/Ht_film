<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeyal Film Cenneti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: #bbb; font-family: Arial, sans-serif; margin: 0; }
        header { background: #000; padding: 10px 5%; display: flex; justify-content: space-between; border-bottom: 2px solid #9d00ff; sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; color: #00d4ff; font-weight: bold; text-decoration: none; }
        
        .main-container { display: flex; padding: 20px 5%; gap: 20px; }
        .content { flex: 3; }
        .sidebar { flex: 1; min-width: 250px; }

        /* Üst Slayder (Şəkildəki yan-yana olanlar) */
        .top-slides { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; }
        .t-card { min-width: 180px; height: 110px; background: #1a1a1a; border-radius: 4px; position: relative; }
        .t-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        /* Dairəvi "Yakında" (648755.jpg-dəki kimi) */
        .circles { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }
        .c-item { text-align: center; font-size: 11px; min-width: 80px; }
        .c-item img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #9d00ff; object-fit: cover; }

        /* Film Qridi */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .m-item { background: #161616; border-radius: 5px; overflow: hidden; cursor: pointer; border-bottom: 2px solid transparent; }
        .m-item:hover { border-color: #00d4ff; }
        .m-item img { width: 100%; height: 200px; object-fit: cover; }
        .m-item h4 { font-size: 12px; margin: 5px; white-space: nowrap; overflow: hidden; }

        /* Sidebar (648757.jpg-dəki bölmələr) */
        .robot-btn { background: #e50914; color: #fff; padding: 12px; text-align: center; border-radius: 5px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .side-box { background: #1a1a1a; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .side-title { color: #fff; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; }
        .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .genre-item { background: #252525; padding: 5px; font-size: 11px; text-align: center; border-radius: 3px; cursor: pointer; }

        /* Alt Nav (Mobil üçün) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-link { color: #888; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link i { font-size: 18px; display: block; }

        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 200; padding: 20px; }
        iframe { width: 100%; height: 300px; border: none; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Xeyal Film Cenneti</a>
    <i class="fas fa-search"></i>
</header>

<div class="main-container">
    <div class="content">
        <div class="top-slides" id="slides"></div>
        
        <p style="color: #fff;">Yakında Gelecek Filmler</p>
        <div class="circles" id="circles"></div>

        <p style="color: #00d4ff; border-bottom: 1px solid #333; padding-bottom: 5px;">Yeni Eklenenler</p>
        <div class="movie-grid" id="grid"></div>
    </div>

    <div class="sidebar">
        <div class="robot-btn">FİLM ROBOTU</div>
        <div class="side-box">
            <div class="side-title">Türlerine Göre</div>
            <div class="genre-grid" id="genres"></div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link"><i class="fas fa-home"></i>Anasayfa</a>
    <a href="#" class="nav-link"><i class="fas fa-film"></i>Filmler</a>
    <a href="#" class="nav-link"><i class="fas fa-tv"></i>Diziler</a>
    <a href="#" class="nav-link"><i class="fas fa-bars"></i>Menu</a>
</div>

<div id="player">
    <span onclick="closeP()" style="color:white; font-size:30px;">&times;</span>
    <iframe id="ifr" src="" allowfullscreen></iframe>
</div>

<script>
    const API = 'c972e47d1574ac86dfe1d93d7e4a0b35';
    
    async function load() {
        const tr = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}&language=tr-TR`);
        const data = await tr.json();
        
        const grid = document.getElementById('grid');
        data.results.forEach(m => {
            const div = document.createElement('div');
            div.className = 'm-item';
            div.innerHTML = `<img src="https://image.tmdb.org/t/p/w300${m.poster_path}"><h4>${m.title || m.name}</h4>`;
            div.onclick = () => {
                document.getElementById('player').style.display = 'block';
                document.getElementById('ifr').src = `https://vidsrc.to/embed/${m.media_type || 'movie'}/${m.id}`;
            }
            grid.appendChild(div);
        });

        // Üst Slayder
        const slides = document.getElementById('slides');
        data.results.slice(0, 5).forEach(m => {
            const d = document.createElement('div');
            d.className = 't-card';
            d.innerHTML = `<img src="https://image.tmdb.org/t/p/w300${m.backdrop_path}"><p style="position:absolute; bottom:5px; left:5px; font-size:10px; margin:0;">${m.title || m.name}</p>`;
            slides.appendChild(d);
        });

        // Janrlar
        const gRes = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${API}&language=tr-TR`);
        const gData = await gRes.json();
        gData.genres.forEach(g => {
            const i = document.createElement('div');
            i.className = 'genre-item';
            i.innerText = g.name;
            document.getElementById('genres').appendChild(i);
        });

        // Dairələr
        data.results.slice(10, 18).forEach(m => {
            const c = document.createElement('div');
            c.className = 'c-item';
            c.innerHTML = `<img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><p>${m.title || m.name}</p>`;
            document.getElementById('circles').appendChild(c);
        });
    }

    function closeP() { document.getElementById('player').style.display='none'; document.getElementById('ifr').src=''; }
    load();
</script>
</body>
</html>
