<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XEYAL FİLM CENNETİ | Ultimate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e50914; /* Netflix Qırmızısı */
            --secondary: #00d4ff; /* Futuristik Mavi */
            --bg-dark: #050505;
            --card-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVİQASİYA (PREMİUM) --- */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: var(--primary);
            text-decoration: none;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }

        .search-box {
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            outline: none;
            width: 200px;
            transition: 0.4s;
        }

        .search-box input:focus { width: 300px; }

        /* --- JANR FILTRLƏRİ --- */
        .categories {
            margin-top: 100px;
            padding: 0 5%;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: #222;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); border-color: white; }

        /* --- FİLM QRİD --- */
        .main-content { padding: 40px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .movie-card:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        
        .card-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.8); color: #f5c518;
            padding: 3px 7px; border-radius: 5px; font-size: 12px; font-weight: bold;
        }

        /* --- PROFESSIONAL PLAYER MODAL --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; overflow-y: auto;
        }

        .modal-inner { width: 95%; max-width: 1200px; margin: 30px auto; position: relative; }
        
        .video-container { border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #333; }
        iframe { width: 100%; height: 600px; border: none; }

        /* SERVER VƏ SERİAL KONTROLLARI */
        .player-footer {
            background: #111; padding: 25px; margin-top: -5px; border-radius: 0 0 15px 15px;
        }

        .server-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .s-btn { background: #333; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .s-btn.active { background: var(--secondary); color: #000; font-weight: bold; }

        .season-selector { margin-bottom: 20px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; }
        .ep-box { background: #222; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; }
        .ep-box:hover, .ep-box.active { background: var(--primary); }

        .close-modal { position: absolute; top: -40px; right: 0; font-size: 40px; cursor: pointer; }

        @media (max-width: 768px) { iframe { height: 300px; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="location.reload()">XEYAL FİLM CENNETİ</a>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Film, Serial və ya Janr...">
        </div>
    </header>

    <div class="categories" id="genreList">
        <div class="cat-btn active" onclick="loadMovies('/trending/all/week')">Trend</div>
        </div>

    <div class="main-content">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-inner">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div class="video-container">
                <iframe id="mainPlayer" src="" allowfullscreen></iframe>
            </div>

            <div class="player-footer">
                <div class="server-btns">
                    <div class="s-btn active" id="srv1">Alternativ 1</div>
                    <div class="s-btn" id="srv2">Alternativ 2</div>
                </div>

                <div id="tvControls" style="display: none;">
                    <div class="season-selector" id="seasonList"></div>
                    <div class="episode-grid" id="episodeList"></div>
                </div>

                <h2 id="mTitle" style="color: var(--primary); margin-top: 20px;"></h2>
                <p id="mDesc" style="color: #ccc; font-size: 14px;"></p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'c972e47d1574ac86dfe1d93d7e4a0b35';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/w500';

        // 1. İLKİN YÜKLƏMƏ VƏ JANRLAR
        window.onload = () => {
            loadMovies('/trending/all/week');
            loadGenres();
        };

        async function loadGenres() {
            const res = await fetch(`${BASE_URL}/genre/movie/list?api_key=${API_KEY}&language=az-AZ`);
            const data = await res.json();
            const list = document.getElementById('genreList');
            data.genres.forEach(g => {
                const btn = document.createElement('div');
                btn.className = 'cat-btn';
                btn.innerText = g.name;
                btn.onclick = () => loadMovies('/discover/movie', `&with_genres=${g.id}`);
                list.appendChild(btn);
            });
        }

        async function loadMovies(path, query = '') {
            const res = await fetch(`${BASE_URL}${path}?api_key=${API_KEY}&language=az-AZ${query}`);
            const data = await res.json();
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            data.results.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="card-badge">IMDB ${m.vote_average.toFixed(1)}</div>
                    <img src="${IMG + m.poster_path}" alt="">
                `;
                card.onclick = () => openPlayer(m.id, (m.media_type === 'tv' || m.first_air_date) ? 'tv' : 'movie');
                grid.appendChild(card);
            });
        }

        // 2. PLAYER MƏNTİQİ (MULTI-SERVER & SERIAL)
        let currentId, currentType;

        async function openPlayer(id, type) {
            currentId = id; currentType = type;
            const res = await fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=az-AZ`);
            const data = await res.json();

            document.getElementById('mTitle').innerText = data.title || data.name;
            document.getElementById('mDesc').innerText = data.overview;
            const player = document.getElementById('mainPlayer');
            const tvDiv = document.getElementById('tvControls');

            if (type === 'movie') {
                tvDiv.style.display = 'none';
                player.src = `https://vidsrc.xyz/embed/movie/${id}`;
            } else {
                tvDiv.style.display = 'block';
                setupTV(data);
                player.src = `https://vidsrc.xyz/embed/tv/${id}/1-1`;
            }

            // Server düymələrini aktivləşdir
            document.getElementById('srv1').onclick = () => {
                player.src = `https://vidsrc.xyz/embed/${type}/${id}${type === 'tv' ? '/1-1' : ''}`;
                setActiveServer('srv1');
            };
            document.getElementById('srv2').onclick = () => {
                player.src = `https://vidsrc.to/embed/${type}/${id}${type === 'tv' ? '/1/1' : ''}`;
                setActiveServer('srv2');
            };

            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function setupTV(data) {
            const sList = document.getElementById('seasonList');
            sList.innerHTML = '';
            data.seasons.forEach(s => {
                if(s.season_number > 0) {
                    const btn = document.createElement('div');
                    btn.className = 'cat-btn';
                    btn.innerText = `Sezon ${s.season_number}`;
                    btn.onclick = () => loadEpisodes(data.id, s.season_number);
                    sList.appendChild(btn);
                }
            });
            loadEpisodes(data.id, 1);
        }

        async function loadEpisodes(tvId, sNum) {
            const res = await fetch(`${BASE_URL}/tv/${tvId}/season/${sNum}?api_key=${API_KEY}`);
            const data = await res.json();
            const epList = document.getElementById('episodeList');
            epList.innerHTML = '';
            data.episodes.forEach(ep => {
                const box = document.createElement('div');
                box.className = 'ep-box';
                box.innerText = ep.episode_number;
                box.onclick = () => {
                    document.getElementById('mainPlayer').src = `https://vidsrc.xyz/embed/tv/${tvId}/${sNum}-${ep.episode_number}`;
                    document.querySelectorAll('.ep-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');
                };
                epList.appendChild(box);
            });
        }

        function setActiveServer(id) {
            document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.body.style.overflow = 'auto';
        }

        // 3. AXTARIŞ
        document.getElementById('searchInput').onkeypress = (e) => {
            if(e.key === 'Enter') loadMovies('/search/multi', `&query=${e.target.value}`);
        };
    </script>
</body>
</html>
